events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # Security
    include /etc/nginx/conf.d/security.conf;

    # SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Upstream for main Django app
    upstream web_server {
        ip_hash;
        server web:8000;
    }

    # Upstream for image endpoint service
    upstream img_endpoint {
        server img-endpoint:8000;
    }

    ############################################
    # HTTP (Port 80) — ACME + Redirect
    ############################################

    server {
        listen 80;
        server_name safarisovereignresidence.com www.safarisovereignresidence.com;
        client_max_body_size 50M;
        # Allow Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/lib/certbot;  # MUST match Docker mount
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }    

    ############################################
    # HTTPS (Port 443)
    ############################################
    server {
    listen 443 ssl http2;
    server_name safarisovereignresidence.com www.safarisovereignresidence.com;
    client_max_body_size 50M;
    # Certificates
    ssl_certificate /etc/letsencrypt/live/safarisovereignresidence.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/safarisovereignresidence.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ACME challenge (HTTPS)
    location /.well-known/acme-challenge/ {
        root /var/lib/certbot;
    }

    # Static files
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Media files
    location /media/ {
        alias /app/media/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ESP32-CAM doorbell endpoint - NEW
    location /doorbell/ {
        proxy_pass http://img_endpoint/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase buffer sizes for image uploads
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        
        # Increase timeouts for image processing
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Allow larger file uploads (for images)
        client_max_body_size 10M;
    }

    # Alternative API endpoint for image processing - NEW
    location /img-api/ {
        proxy_pass http://img_endpoint/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase buffer sizes for image uploads
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        
        # Increase timeouts for image processing
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Allow larger file uploads (for images)
        client_max_body_size 10M;
    }

    # Main Django app - PRESERVED
    location / {
        proxy_pass http://web_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

}